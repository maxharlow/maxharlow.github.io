-   title: Exploring networks with graph databases
    details: Graph databases are incredibly useful to find connections or patterns within our data. This is a hands-on introduction to graph database [Neo4j](https://neo4j.com/), showing examples of its use for investigative stories including the Panama and Paradise Papers, and teaching attendees how to build a graph of noteworthy individuals and match them with corporate data to see the networks involved.
