-   title: "Don't fear the robots: five reasons investigative journalists should welcome automation"
    details: |
        This talk explained the ways automation is already being used in newsrooms, why the coming wave of automation is not a threat, and how we can embrace this new technology to improve the quality of investigative reporting at a time of shrinking newsroom resources.
    runs:
      - event: Dataharvest 2018
        location: Mechelen, Belgium
        date: 2018-05-27
        slides: https://docs.google.com/presentation/d/16cGPgILBrYfka9CNf4QHUFbIf2H0bhI2HplI9ioo1fM

-   title: GitHub for journalists
    details: Whether you find yourself collaborating on code, data, or prose, [GitHub](https://github.com/) can work for journalists. This class covered what GitHub is, the benefits of using it, and how it is typically used both by people doing data analysis and by developers. Attendees were shown how to create a first repository and make pull requests.
    runs:
      - date: 2018-03-08
        event: Nicar 2018
        location: Chicago, USA
        slides: https://docs.google.com/presentation/d/1MbltRcOerktc-E26HMDjYj0BO9CTubQWu1Z2bB9CpVY

-   title: Code for journalists
    details: How can code help you or your team with investigations? This two-hour session was a hand-holding hands-on introduction to programming, showing recent examples of published stories and demystifying the jargon. Attendees were guided through the tools needed, including text editors and an introduction to the command line. This later evolved into a weekend course.
    runs:
      - date: 2017-06-23
        event: CIJ Summer Conference 2017
        location: London, UK

-   title: Building a culture of knowledge sharing in journalism
    details: |
        As data becomes increasingly important to journalism reporters need to keep their skills up to date. However, newsrooms have less budget for training and conferences than ever before. This was a lightning talk on how [Journocoders](https://journocoders.com/) tries to solve these problems. [Video here.](https://www.youtube.com/watch?v=ZF6E4e4F5Po)
