    details: |
        Though much data-led reporting is done in Excel, some can only be reported using other tools. This talk ran through a few stories which took different approaches. [Write-up here.](https://web.archive.org/web/20160501150750/http://foodresearch.org.uk/2015/09/frc-holds-members-only-event-with-the-bureau-of-investigative-journalism-on-researching-influential-organisations/)
