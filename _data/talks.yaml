-   title: Stories from the command line
    details: |
        For those taking their first steps with data and code, the command line is essential. There are also many useful command line based applications -- understanding it opens the door to these power tools. This session covered how it works, the basic commands and concepts, and some of the tools which can be useful in data investigations, including story examples.
