-   title: Using the Guardian's Content API
    details: |
        An introduction to the Guardian\'s [Content API](https://open-platform.theguardian.com/), which lets developers build their own applications using Guardian content. Also judge on a prize for the best use of the API. [Write-up here.](https://blog.wan-ifra.org/2014/05/04/app-to-game-ify-the-news-wins-mediahackdays)
