-   title: How to be a (better) data editor
    details: |
        As data journalism has become mainstream, more data editor positions have been created. But what makes a good data editor? In this panel we discussed what it takes to do the job effectively, the different things it can involve, and the different routes to getting there. With Marie-Louise Timcke, Jan Strozyk, Helena Bengtsson, Eva Belmonte, and Dominik Balmer, moderated by me.
    runs:
      - event: Dataharvest 2022
        location: Mechelen, Belgium
        date: 2022-05-21

-   title: Investigative data journalism
    details: |
        Guest lecture covering the origins of investigative data journalism, the nature of data in investigations, where it comes from, plus what code is and how it is used in the newsroom to do this kind of work.
    runs:
      - event: Journalism by Numbers, Birkbeck University
        location: London, UK
        date: 2022-03-23

-   title: An introduction to data for investigations
    details: Where do you start using data in investigations? This training morning covers what data really is, developing a 'data state of mind' to spot opportunities, data sourcing including using unstructured data, hands-on scraping websites and interviewing datasets to get answers to your questions, as well as developing rigorous working practices that help you avoid mistakes.
    runs:
      - date: 2021-08-24
        event: Birn Summer School 2021
        location: Mlini, Croatia

-   title: How to think about data
    details: |
        This session explained concepts as well as covered tips, tricks, and traps to avoid when working with data. Together they can help you get more organised, better understand your data, ease the friction of collaborating with others, see new opportunities, and develop working practices that make it harder to be wrong.
    runs:
      - event: Dataharvest Digital 2021
        location: Online
        date: 2021-05-25
        slides: https://docs.google.com/presentation/d/1xcnBda0d4YFnrzfZe5vPO2kgSEBh2aouACKFN2-isiI

-   title: Scraping from scratch
    details: You may have come across acronyms like HTTP and HTML, but what do they mean, and what does it matter? This class explains the concepts that underpin how the web works -- which are simpler than you might think -- as well as how you can use this knowledge to extract out the information you need, and understand how exactly your stories reach your readers.
    runs:
      - date: 2021-05-18
        event: Dataharvest Digital 2021
        location: Online
        slides: https://docs.google.com/presentation/d/1w37f17FKrDp8sNxxzhncXFgSQ7v5pN4E1irewdiVBeA

