        location: Mechelen, Belgium

-   title: "Web basics: how the web works, and how to scrape it"
    details: Have you ever wondered how exactly your stories reach your readers? Ever wanted to know how to build a simple webpage? Or how to scrape information from the web? This session covers the principles of how web pages get onto your screen, and working with the two key web technologies of HTML and CSS. Dataharvest sessions taught with Rui Barros.
