-   title: Tracking changes with GitHub Actions
    details: Sometimes how data changes can be more interesting than the data itself. For example, Wikipedia lets you see how a page has been edited - adding or cutting out certain bits of information. Using GitHub Actions, we can do something similar for any webpage. This session covers using Actions to regularly run a scraper, analysing the output, and identifying changes over time.
    runs:
      - date: 2024-05-31
        event: Dataharvest 2024
        location: Mechelen, Belgium

      - date: 2023-06-02
        event: Dataharvest 2023
        location: Mechelen, Belgium

-   title: "Time travel for beginners: how to create and use web archives"
    details: Ever relied upon an online source, only later to find it deleted or changed? This class covers how to get the most out of resources like the Wayback Machine -- what they're good for, and what they're not. We also cover when and how to build your own private archives of web content.
    runs:
