-   title: Why code?
    details: |
        How code is being used in newsrooms to find stories? If you're just starting out, where should you start, and how should you approach learning such skills? Panel with Helena Bengtsson and Niamh McIntyre, moderated by Leila Haddou.
    runs:
      - event: CIJ Summer Conference 2019
        location: London, UK
        date: 2019-07-04

-   title: How can code help your journalism?
    details: |
        An introduction to how code is used in the newsroom, with recent story examples, explaining the fundamental concepts and demystifying the jargon. We also guided attendees through the most common programming languages, and gave a roadmap to deciding which to pursue.
    runs:
