-   title: 'The power of fuzzy: finding connections in a messy world'
    details: |
        Like our reality, our data is often messy. Finding meaningful connections between such datasets often means using fuzzy matching algorithms. This was a high-level look at some of the most commonly used algorithms, their pros and cons, and how they are used in practice.
